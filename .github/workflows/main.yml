name: Kuvaj Keenetic FIP
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # Fabrička prečica koja sama bezbedno skida hanwckf kod bez kucanja linkova:
      - name: Skupljanje koda
        uses: actions/checkout@v4
        with:
          repository: hanwckf/bl-mt798x

      - name: Instalacija alata
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu device-tree-compiler git python3

      - name: Kompajliranje
        run: |
          chmod +x build.sh
          # Tvoja tačna komanda za MT7981 DDR4 ploču:
          SOC=mt7981 BOARD=rfb-ddr4 ./build.sh

      - name: Slanje gotovog FIP fajla
        uses: actions/upload-artifact@v4
        with:
          name: Keenetic-Hero-DDR4-FIP
          path: output/*
